name: Build Release Installers

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing GitHub Release tag to receive the installers
        required: true
        default: v0.1.0-python310
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-22.04
    outputs:
      release_tag: ${{ steps.release.outputs.release_tag }}
    steps:
      - id: release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
        run: |
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" --title "Meta Video Filter $RELEASE_TAG" --generate-notes
          fi
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

  linux-appimage:
    needs: prepare-release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Build AppImage
        run: ./scripts/build_linux_appimage.sh
      - name: Upload AppImage to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
        run: gh release upload "$RELEASE_TAG" release/MetaVideoFilter-linux-x86_64.AppImage --clobber

  windows-installer:
    needs: prepare-release
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install Windows packaging tools
        shell: powershell
        run: choco install innosetup ffmpeg -y --no-progress
      - name: Build installer
        shell: powershell
        run: >
          .\scripts\build_windows_installer.ps1
          -Python python
          -PythonArgs @()
          -FfmpegPath "$env:ChocolateyInstall\bin\ffmpeg.exe"
      - name: Upload installer to GitHub Release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
        run: gh release upload $env:RELEASE_TAG release\MetaVideoFilter_Setup_0.1.0.exe --clobber
